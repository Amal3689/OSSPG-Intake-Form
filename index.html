<!DOCTYPE html>
<html>
<head>
  <title>Azure PostgreSQL CSE Request</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f6f8;
      padding: 40px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 520px;
      margin-bottom: 20px;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 15px;
    }

    button {
      padding: 10px;
      background: #0078d4;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Submit a Request</h1>

<div class="card">

  <h3>Customer Success Engineering</h3>
  <p><b>Azure PostgreSQL CSE Engagement Request</b></p>

  <!-- Q1 -->
  <label>Do you need assistance for unblocking migration?</label>
  <select id="q1">
    <option value="">--Select--</option>
    <option value="Yes">Yes</option>
    <option value="No">No</option>
  </select>

  <!-- Q2 -->
  <div id="q2Section" style="display:none;">
    <label>Is this presales or postsales?</label>
    <select id="q2">
      <option value="">--Select--</option>
      <option value="Presales">Presales</option>
      <option value="Postsales">Postsales</option>
    </select>
  </div>

  <button id="nextBtn" style="display:none;">Next</button>
</div>

<div id="formSection" style="display:none;" class="card">

  <h2>Account Information</h2>

  <input type="email" id="email" placeholder="User Email" required>
  <input type="text" id="contact" placeholder="Primary Microsoft Contact">
  <input type="text" id="accountName" placeholder="Account Name">
  <input type="text" id="country" placeholder="Country">
  <input type="text" id="region" placeholder="Region">
  <input type="text" id="source" placeholder="Source Platform">
  <input type="text" id="target" placeholder="Target Platform">

  <select id="s500">
    <option value="">S500 Customer?</option>
    <option value="Yes">Yes</option>
    <option value="No">No</option>
  </select>

  <h2>Service Request</h2>

  <input type="text" id="requestType" placeholder="Request Type">
  <textarea id="description" placeholder="Description"></textarea>
  <textarea id="scenario" placeholder="Customer Scenario"></textarea>

  <button id="submitBtn">Submit</button>
</div>

<script>

const q1 = document.getElementById("q1");
const q2Section = document.getElementById("q2Section");
const nextBtn = document.getElementById("nextBtn");
const formSection = document.getElementById("formSection");

// Q1 logic
q1.addEventListener("change", function () {
  if (this.value === "Yes") {
    nextBtn.style.display = "inline";
    q2Section.style.display = "none";
  } else if (this.value === "No") {
    nextBtn.style.display = "none";
    q2Section.style.display = "block";
  }
});

// Show form
nextBtn.addEventListener("click", function () {
  formSection.style.display = "block";
});

// Submit
document.getElementById("submitBtn").addEventListener("click", async () => {

  const data = {
    q1: document.getElementById("q1").value,
    q2: document.getElementById("q2") ? document.getElementById("q2").value : "",

    email: document.getElementById("email").value,
    contact: document.getElementById("contact").value,
    accountName: document.getElementById("accountName").value,
    country: document.getElementById("country").value,
    region: document.getElementById("region").value,
    source: document.getElementById("source").value,
    target: document.getElementById("target").value,
    s500: document.getElementById("s500").value,

    requestType: document.getElementById("requestType").value,
    description: document.getElementById("description").value,
    scenario: document.getElementById("scenario").value
  };

  console.log("Submitting:", data);

  const response = await fetch("/api/submit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const result = await response.text();
  alert(result);
});

</script>

</body>
</html>
