<!DOCTYPE html>
<html>
<head>
  <title>CSE Engagement Request</title>

  <style>
    body {
      font-family: Segoe UI, Arial;
      background-color: #f4f6f8;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 750px;
    }

    h1 {
      color: #0078d4;
      text-align: center;
      margin-bottom: 20px;
    }

    /* Stepper */
    .stepper {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .step {
      text-align: center;
      flex: 1;
      font-size: 14px;
      color: #999;
    }

    .step.active {
      color: #0078d4;
      font-weight: bold;
    }

    .step::before {
      content: "●";
      display: block;
      margin-bottom: 5px;
    }

    /* Card */
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    label {
      font-weight: 500;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    textarea {
      height: 80px;
    }

    .button-container {
      display: flex;
      justify-content: space-between;
    }

    button {
      background-color: #0078d4;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
    }

    button.secondary {
      background-color: #ccc;
      color: black;
    }

    button:hover {
      opacity: 0.9;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>CSE Engagement Request</h1>

  <!-- Stepper -->
  <div class="stepper">
    <div class="step active" id="stepLabel1">Qualification</div>
    <div class="step" id="stepLabel2">Details</div>
    <div class="step" id="stepLabel3">Review</div>
  </div>

  <!-- STEP 1 -->
  <div class="card" id="step1">

    <label>Do you need assistance for migration?</label>
    <select id="q1">
      <option value="">-- Select --</option>
      <option>Yes</option>
      <option>No</option>
    </select>

    <div id="q2Section" style="display:none;">
      <label>Presales or Postsales?</label>
      <select id="q2">
        <option value="">-- Select --</option>
        <option>Presales</option>
        <option>Postsales</option>
      </select>
    </div>

    <div class="button-container">
      <div></div>
      <button id="next1" style="display:none;">Next</button>
    </div>

  </div>

  <!-- STEP 2 -->
  <div class="card" id="step2" style="display:none;">

    <h3>Account Information</h3>

    <input id="email" placeholder="Email">
    <input id="accountName" placeholder="Account Name">
    <input id="country" placeholder="Country">

    <h3>Request Details</h3>

    <input id="requestType" placeholder="Request Type">
    <textarea id="description" placeholder="Description"></textarea>

    <div class="button-container">
      <button class="secondary" id="back1">Back</button>
      <button id="next2">Next</button>
    </div>

  </div>

  <!-- STEP 3 (Review) -->
  <div class="card" id="step3" style="display:none;">

    <h3>Review Your Request</h3>

    <div id="reviewData"></div>

    <div class="button-container">
      <button class="secondary" id="back2">Back</button>
      <button id="submitBtn">Submit</button>
    </div>

  </div>

</div>

<script>

const q1 = document.getElementById("q1");
const q2 = document.getElementById("q2");
const q2Section = document.getElementById("q2Section");
const next1 = document.getElementById("next1");

// Step 1 logic
q1.addEventListener("change", () => {
  if (q1.value !== "") {
    q2Section.style.display = "block";
    next1.style.display = "none";
  }
});

q2.addEventListener("change", () => {
  if (q2.value !== "") {
    next1.style.display = "inline-block";
  }
});

// Navigation
next1.onclick = () => {
  showStep(2);
};

document.getElementById("back1").onclick = () => showStep(1);
document.getElementById("back2").onclick = () => showStep(2);

document.getElementById("next2").onclick = () => {

  const review = `
    <b>Q1:</b> ${q1.value}<br>
    <b>Q2:</b> ${q2.value}<br>
    <b>Email:</b> ${email.value}<br>
    <b>Account:</b> ${accountName.value}<br>
    <b>Country:</b> ${country.value}<br>
    <b>Request Type:</b> ${requestType.value}<br>
  `;

  document.getElementById("reviewData").innerHTML = review;

  showStep(3);
};

// Submit
document.getElementById("submitBtn").onclick = async () => {

  const data = {
    q1: q1.value,
    q2: q2.value,
    email: email.value,
    accountName: accountName.value,
    country: country.value,
    requestType: requestType.value,
    description: description.value
  };

  await fetch("/api/submit", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  alert("Submitted successfully!");
};

// Step control
function showStep(step) {
  document.getElementById("step1").style.display = step === 1 ? "block" : "none";
  document.getElementById("step2").style.display = step === 2 ? "block" : "none";
  document.getElementById("step3").style.display = step === 3 ? "block" : "none";

  document.getElementById("stepLabel1").classList.toggle("active", step === 1);
  document.getElementById("stepLabel2").classList.toggle("active", step === 2);
  document.getElementById("stepLabel3").classList.toggle("active", step === 3);
}

</script>

</body>
</html>
