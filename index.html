<!DOCTYPE html>
<html>
<head>
  <title>Azure PostgreSQL CSE Request</title>
  <style>
    body {
      font-family: Arial;
      margin: 40px;
    }
    .box {
      border: 2px solid #ccc;
      padding: 20px;
      width: 500px;
      border-radius: 10px;
    }
    h2, h3 {
      margin-top: 0;
    }
    .section {
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <h1>Submit a Request</h1>

  <div class="box">
    <h3>Customer Success Engineering</h3>
    <p><b>Azure PostgreSQL CSE Engagement Request</b></p>

    <!-- Q1 -->
    <label>Do you need assistance for unblocking customer migration to Azure PostgreSQL?</label><br>
    <select id="q1">
      <option value="">-- Select --</option>
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>

    <br><br>

    <!-- Q2 (Hidden initially) -->
    <div id="q2Section" style="display:none;">
      <label>Is this a pre-sales or post-sales technical support request?</label><br>
      <select id="q2">
        <option value="">-- Select --</option>
        <option value="Presales">Presales</option>
        <option value="Postsales">Postsales</option>
      </select>
    </div>

    <br>

    <!-- Next Button -->
    <button id="nextBtn" style="display:none;">Next</button>
  </div>

  <!-- Intake Form -->
  <div id="formSection" style="display:none;">

    <!-- Account Information -->
    <div class="section">
      <h2>Account Information</h2>

      <label>Primary Microsoft Contact:</label><br>
      <input type="text" id="contact"><br><br>

      <label>Account Name:</label><br>
      <input type="text" id="accountName"><br><br>

      <label>Country:</label><br>
      <input type="text" id="country"><br><br>

      <label>Region:</label><br>
      <input type="text" id="region"><br><br>

      <label>Source Platform:</label><br>
      <input type="text" id="source"><br><br>

      <label>Target Platform:</label><br>
      <input type="text" id="target"><br><br>

      <label>Is this a S500 Customer:</label><br>
      <select id="s500">
        <option value="">-- Select --</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
    </div>

    <!-- Service Request Details -->
    <div class="section">
      <h2>Service Request Details</h2>

      <label>Request Type:</label><br>
      <input type="text" id="requestType"><br><br>

      <label>Description of Request:</label><br>
      <textarea id="description"></textarea><br><br>

      <label>Customer Scenario:</label><br>
      <textarea id="scenario"></textarea><br><br>
    </div>

    <button id="submitBtn">Submit</button>
  </div>

  <!-- SCRIPT -->
  <script>
    const q1 = document.getElementById("q1");
    const q2Section = document.getElementById("q2Section");
    const nextBtn = document.getElementById("nextBtn");
    const formSection = document.getElementById("formSection");

    // Handle Q1 logic
    q1.addEventListener("change", function () {
      if (this.value === "Yes") {
        nextBtn.style.display = "inline";
        q2Section.style.display = "none";
      } else if (this.value === "No") {
        nextBtn.style.display = "none";
        q2Section.style.display = "block";
      } else {
        nextBtn.style.display = "none";
        q2Section.style.display = "none";
      }
    });

    // Next button → show form
    nextBtn.addEventListener("click", function () {
      formSection.style.display = "block";
      window.scrollTo(0, document.body.scrollHeight);
    });

    // Submit form
    document.getElementById("submitBtn").addEventListener("click", async () => {
      await fetch("/api/submit", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          contact: document.getElementById("contact").value,
          accountName: document.getElementById("accountName").value,
          country: document.getElementById("country").value,
          region: document.getElementById("region").value,
          source: document.getElementById("source").value,
          target: document.getElementById("target").value,
          s500: document.getElementById("s500").value,
          requestType: document.getElementById("requestType").value,
          description: document.getElementById("description").value,
          scenario: document.getElementById("scenario").value
        })
      });

      alert("Form submitted successfully!");
    });
  </script>

</body>
</html>
