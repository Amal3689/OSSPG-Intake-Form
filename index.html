<!DOCTYPE html>
<html>
<head>
  <title>Azure PostgreSQL CSE Request</title>

  <style>
    body {
      font-family: Segoe UI, Arial;
      background-color: #f4f6f8;
      margin: 0;
      padding: 40px;
    }

    h1 {
      color: #0078d4;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 520px;
      margin-bottom: 20px;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 15px;
    }

    button {
      background: #0078d4;
      color: white;
      padding: 10px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Submit a Request</h1>

<div class="card">

  <h3>Customer Success Engineering</h3>
  <p><b>Azure PostgreSQL CSE Engagement Request</b></p>

  <label>Do you need assistance for unblocking migration?</label>
  <select id="q1">
    <option value="">--Select--</option>
    <option value="Yes">Yes</option>
    <option value="No">No</option>
  </select>

  <div id="q2Section" style="display:none;">
    <label>Presales or Postsales?</label>
    <select id="q2">
      <option value="">--Select--</option>
      <option value="Presales">Presales</option>
      <option value="Postsales">Postsales</option>
    </select>
  </div>

  <button id="nextBtn" style="display:none;">Next</button>
</div>

<div id="formSection" style="display:none;" class="card">

  <h2>Account Information</h2>

  <input type="email" id="email" placeholder="User Email">
  <input type="text" id="accountName" placeholder="Account Name">
  <input type="text" id="country" placeholder="Country">

  <h2>Service Request</h2>

  <input type="text" id="requestType" placeholder="Request Type">
  <textarea id="description" placeholder="Description"></textarea>

  <button id="submitBtn">Submit</button>
</div>

<script>

const q1 = document.getElementById("q1");
const q2Section = document.getElementById("q2Section");
const nextBtn = document.getElementById("nextBtn");
const formSection = document.getElementById("formSection");

q1.addEventListener("change", function () {
  if (this.value === "Yes") {
    nextBtn.style.display = "inline";
    q2Section.style.display = "none";
  } else if (this.value === "No") {
    nextBtn.style.display = "none";
    q2Section.style.display = "block";
  }
});

nextBtn.addEventListener("click", function () {
  formSection.style.display = "block";
});

document.getElementById("submitBtn").addEventListener("click", async () => {

  const data = {
    email: document.getElementById("email").value,
    accountName: document.getElementById("accountName").value,
    country: document.getElementById("country").value,
    requestType: document.getElementById("requestType").value,
    description: document.getElementById("description").value
  };

  console.log("Submitting:", data);

  const res = await fetch("/api/submit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const text = await res.text();
  alert(text);
});

</script>

</body>
</html>
